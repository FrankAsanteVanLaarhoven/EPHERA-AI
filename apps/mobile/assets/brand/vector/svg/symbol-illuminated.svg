<?xml version="1.0" encoding="UTF-8"?>
<!--
  EPHERA symbol — illuminated (splash / premium marketing only)
  Do not use below 48px. Prefer flat-white for product UI.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none" role="img" aria-label="EPHERA">
  <title>EPHERA symbol illuminated</title>
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="45%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#softGlow)" fill="url(#barGrad)">
    <path d="M18 18 H78 a7 7 0 0 1 0 14 H25 a7 7 0 0 1-7-7 V25 a7 7 0 0 1 0-14 Z"/>
    <path d="M18 41 H68 a7 7 0 0 1 0 14 H28 c-4 0-7-2.5-9-6 c-1.2-2-1.8-4-1-6 c1.2-3 4.5-2 6.5-2 Z"/>
    <path d="M18 64 H78 a7 7 0 0 1 0 14 H25 a7 7 0 0 1-7-7 V71 a7 7 0 0 1 0-14 Z"/>
  </g>
</svg>
