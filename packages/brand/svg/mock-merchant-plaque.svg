<?xml version="1.0" encoding="UTF-8"?>
<!-- Merchant QR plaque mock — acceptance mark + QR zone -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" role="img" aria-label="EPHERA Accepted Here">
  <rect width="400" height="520" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="24" y="24" width="352" height="72" rx="12" fill="#050B18"/>
  <g transform="translate(40,38) scale(0.55)">
    <rect x="16" y="20" width="64" height="14" rx="7" fill="#F4F8FF"/>
    <rect x="16" y="41" width="48" height="14" rx="7" fill="#F4F8FF"/>
    <rect x="16" y="62" width="64" height="14" rx="7" fill="#F4F8FF"/>
  </g>
  <text x="100" y="58"
