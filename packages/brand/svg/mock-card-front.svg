<?xml version="1.0" encoding="UTF-8"?>
<!-- Debit card front mock — flat mark for emboss/print fidelity test -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 856 540" role="img" aria-label="EPHERA debit card">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050B18"/>
      <stop offset="55%" stop-color="#0C1526"/>
      <stop offset="100%" stop-color="#121D32"/>
    </linearGradient>
  </defs>
  <rect width="856" height="540" rx="28" fill="url(#cardBg)"/>
  <rect x="1" y="1" width="854" height="538" rx="27" fill="none" stroke="rgba(148,163,184,0.2)" stroke-width="2"/>
  <!-- Flat symbol top-left -->
  <g transform="translate(40,40) scale(0.7)">
    <rect x="16" y="20" width="64" height="14" rx="7" fill="#F4F8FF"/>
    <rect x="16" y="41" width="48" height="14" rx="7" fill="#F4F8FF"/>
    <rect x="16" y="62" width="64" height="14" rx="7" fill="#F4F8FF"/>
  </g>
  <text x="120" y="88"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="22" font-weight="300" letter-spacing="0.28em" fill="#F4F8FF">EPHERA</text>
  <!-- Chip -->
  <rect x="64" y="200" width="72" height="56" rx="8" fill="#C9A227" opacity="0.85"/>
  <text x="64" y="320"
    font-family="ui-monospace, monospace"
    font-size="28" font-weight="500" letter-spacing="0.18em" fill="#E8F1FF">••••  ••••  ••••  4281</text>
  <text x="64" y="380"
    font-family="system-ui, sans-serif"
    font-size="12" font-weight="600" letter-spacing="0.12em" fill="#8B9BB8">CARDHOLDER</text>
  <text x="64" y="410"
    font-family="system-ui, sans-serif"
    font-size="18" font-weight="500" letter-spacing="0.08em" fill="#F4F8FF">AMA MENSAH</text>
  <text x="640" y="380"
    font-family="system-ui, sans-serif"
    font-size="12" font-weight="600" letter-spacing="0.12em" fill="#8B9BB8">EXPIRES</text>
  <text x="640" y="410"
    font-family="system-ui, sans-serif"
    font-size="18" font-weight="500" fill="#F4F8FF">09/29</text>
  <text x="64" y="490"
    font-family="system-ui, sans-serif"
    font-size="11" font-weight="500" letter-spacing="0.06em" fill="#5C6B86">EPHERA Money · debit</text>
</svg>
