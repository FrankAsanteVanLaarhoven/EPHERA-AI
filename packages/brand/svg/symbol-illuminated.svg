<?xml version="1.0" encoding="UTF-8"?>
<!--
  EPHERA symbol — illuminated (splash / launch film / premium marketing only)
  Do not use below 48px. Prefer flat-white for product UI.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none" role="img" aria-label="EPHERA">
  <title>EPHERA symbol illuminated</title>
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="45%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#softGlow)" fill="url(#barGrad)">
    <rect x="16" y="20" width="64" height="14" rx="7"/>
    <rect x="16" y="41" width="48" height="14" rx="7"/>
    <rect x="16" y="62" width="64" height="14" rx="7"/>
  </g>
</svg>
